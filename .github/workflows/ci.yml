name: CI

# CI itself is allowed to use the internet (to fetch the base toolchain,
# npm/pip packages when regenerating vendor bundles, etc.) -- what it
# VERIFIES is that the application runtime, and the offline release
# bundle it produces, do not need internet access. See docs/airgap.md
# and docs/release-process.md for the full repository-vs-release-artifact
# split this workflow enforces.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run test suite
        run: python -m pytest -q

  frontend-typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

  airgap-validation:
    name: Air-gap compliance validation (source tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run air-gap validation
        run: python3 scripts/validate_airgap.py

  docs-build:
    name: Documentation build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build (includes /documentation static rendering)
        working-directory: frontend
        run: npm run build
      - name: Verify every docs/ page has a rendered output
        run: |
          for f in docs/*.md; do
            slug=$(basename "$f" .md)
            if [ "$slug" = "index" ]; then continue; fi
            if [ ! -f "frontend/out/documentation/${slug}/index.html" ] && [ ! -f "frontend/out/documentation/${slug}.html" ]; then
              echo "::error::docs/${slug}.md has no corresponding built page under frontend/out/documentation/"
              exit 1
            fi
          done
      - name: Verify Swagger/ReDoc paths were not shadowed by the docs portal
        run: |
          if [ -d "frontend/out/docs" ]; then
            echo "::error::frontend/out/docs/ exists -- the docs portal must live under /documentation, never /docs, to avoid colliding with FastAPI's Swagger UI route."
            exit 1
          fi

  build-release-bundle:
    name: Build offline release bundle
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-typecheck, airgap-validation, docs-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies (for the fresh build step)
        working-directory: frontend
        run: npm ci
      - name: Build the offline release bundle
        # This single script (with internet access, only available here
        # in CI) does everything docs/release-process.md describes:
        # regenerates vendor/python/ if missing, builds vendor/npm/ fresh
        # (never committed to git -- see vendor/npm/README.md), builds
        # frontend/out/ fresh, stages everything an offline install
        # needs, validates it with scripts/validate_airgap.py, and zips
        # it with checksums. Runtime code never runs this script; only
        # release engineering does.
        run: ./scripts/build_release_bundle.sh
      - name: Upload release bundle as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: configfoundry-offline-release
          path: |
            ConfigFoundry-Offline-*.zip
            ConfigFoundry-Offline-*.zip.sha256
          retention-days: 30
      - name: Publish to GitHub Releases (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ConfigFoundry-Offline-*.zip
            ConfigFoundry-Offline-*.zip.sha256
          generate_release_notes: true

  offline-install-smoke-test:
    name: Offline install smoke test (the real proof)
    runs-on: ubuntu-latest
    needs: [build-release-bundle]
    steps:
      - name: Download the release bundle built above
        uses: actions/download-artifact@v4
        with:
          name: configfoundry-offline-release
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Verify the bundle checksum, then extract it
        run: |
          sha256sum -c ConfigFoundry-Offline-*.zip.sha256
          BUNDLE_ZIP="$(ls ConfigFoundry-Offline-*.zip)"
          unzip -q "$BUNDLE_ZIP"
          BUNDLE_DIR="${BUNDLE_ZIP%.zip}"
          echo "BUNDLE_DIR=$BUNDLE_DIR" >> "$GITHUB_ENV"
      - name: Simulate an air-gapped machine and install from the bundle alone
        working-directory: ${{ env.BUNDLE_DIR }}
        run: |
          # Firewall this job off from PyPI/npm entirely (belt-and-suspenders
          # on top of --no-index / the bundle having no registry references
          # at all) so a passing run is real proof the extracted bundle is
          # structurally incapable of reaching those hosts, not just that
          # it didn't happen to try.
          sudo iptables -A OUTPUT -p tcp --dport 443 -d pypi.org -j REJECT || true
          sudo iptables -A OUTPUT -p tcp --dport 443 -d files.pythonhosted.org -j REJECT || true
          sudo iptables -A OUTPUT -p tcp --dport 443 -d registry.npmjs.org -j REJECT || true
          python3 scripts/validate_airgap.py
          ./install_offline.sh
      - name: Debug offline bundle
        working-directory: ${{ env.BUNDLE_DIR }}
        run: |
          echo "=============================="
          echo "Current directory"
          pwd

          echo
          echo "=============================="
          echo "Root contents"
          ls -la

          echo
          echo "=============================="
          echo "Top-level directories"
          find . -maxdepth 1 -type d | sort

          echo
          echo "=============================="
          echo "schemas"
          ls -la schemas || true

          echo
          echo "=============================="
          echo "formats"
          ls -la formats || true

          echo
          echo "=============================="
          echo "Python path"
          .venv/bin/python3 - <<'PY'
          import os
          import sys

          print("cwd:", os.getcwd())
          print()

          print("sys.path:")
          for p in sys.path:
              print(" ", p)

          print()

          print("exists schemas:", os.path.isdir("schemas"))
          print("exists formats:", os.path.isdir("formats"))
          print("exists app.py:", os.path.exists("app.py"))
          PY
      - name: Verify the app actually boots
        working-directory: ${{ env.BUNDLE_DIR }}
        run: |
          .venv/bin/python3 -c "
          from app import create_app
          from core.storage.config import AppConfig
          app = create_app(config=AppConfig.for_sqlite('/tmp/ci-smoke.db'))
          assert app is not None
          print('App boots successfully from the offline install.')
          "
