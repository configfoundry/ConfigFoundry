name: CI

# CI itself is allowed to use the internet (to fetch the base toolchain,
# checkout the repo, etc.) -- what it VERIFIES is that the application
# runtime does not need to. See docs/airgap.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run test suite
        run: python -m pytest -q

  frontend-typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

  airgap-validation:
    name: Air-gap compliance validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run air-gap validation
        run: python3 scripts/validate_airgap.py

  offline-install-smoke-test:
    name: Offline install smoke test (the real proof)
    runs-on: ubuntu-latest
    needs: [airgap-validation]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Simulate an air-gapped machine and install
        run: |
          # Firewall this job off from PyPI entirely (belt-and-suspenders
          # on top of --no-index) so a passing run is real proof, not just
          # "we didn't happen to hit the network this time".
          sudo iptables -A OUTPUT -p tcp --dport 443 -d pypi.org -j REJECT || true
          sudo iptables -A OUTPUT -p tcp --dport 443 -d files.pythonhosted.org -j REJECT || true
          ./install_offline.sh
      - name: Verify the app actually boots
        run: |
          .venv/bin/python3 -c "
          from app import create_app
          from core.storage.config import AppConfig
          app = create_app(config=AppConfig.for_sqlite('/tmp/ci-smoke.db'))
          assert app is not None
          print('App boots successfully from the offline install.')
          "

  docs-build:
    name: Documentation build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build (includes /docs static rendering)
        working-directory: frontend
        run: npm run build
      - name: Verify every docs/ page has a rendered output
        run: |
          for f in docs/*.md; do
            slug=$(basename "$f" .md)
            if [ "$slug" = "index" ]; then continue; fi
            if [ ! -f "frontend/out/docs/${slug}/index.html" ] && [ ! -f "frontend/out/docs/${slug}.html" ]; then
              echo "::error::docs/${slug}.md has no corresponding built page under frontend/out/docs/"
              exit 1
            fi
          done
